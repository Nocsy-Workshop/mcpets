name: '${project.name}'
version: '${project.version}'
description: MCModels affiliate plugin. Join the workshop! https://discord.gg/p7QTm2gUyf
load: POSTWORLD
author: Nocsy
contributors: [Jsinco]
website: 'https://mcpets.gitbook.io/mcpets'
folia-supported: true
main: fr.nocsy.mcpets.MCPets
api-version: 1.17
database: false
prefix: '${project.name}'
depend:
  - MythicMobs
softdepend:
  - ModelEngine
  - BetterModel
  - Nexo
  - WorldGuard
  - LuckPerms
  - PlaceholderAPI
  - ItemsAdder
loadbefore: []

commands:
  mcpets:
    description: Command to manage your pets
    Usage: /mcpets
    permission: mcpets.use
    aliases: [pets]

permissions:
  mcpets.use:
    default: true
  mcpets.admin:
    default: op
  mcpets.color:
    default: op
